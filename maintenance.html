<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Under Maintenance</title>
<link rel="icon" type="image/png" href="img/lsfd.png">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    background:#ffffff;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Montserrat, Arial, sans-serif;
}

.container{
    text-align:center;
    max-width:700px;
    padding:20px;
}

.logo{
    width:220px;
    max-width:80%;
    margin-bottom:30px;
}

h1{
    color:#111;
    font-size:42px;
    font-weight:700;
    letter-spacing:3px;
    margin-bottom:15px;
}

.description{
    color:#666;
    font-size:18px;
    line-height:1.7;
    margin-bottom:25px;
}

.discord-link{
    color:#bf0d0d;
    text-decoration:none;
    font-size:18px;
    font-weight:700;
    letter-spacing:1px;
    text-transform:uppercase;
    transition:0.2s;
}

.discord-link:hover{
    text-decoration:underline;
}

@media(max-width:768px){

    .logo{
        width:180px;
    }

    h1{
        font-size:30px;
    }

    .description{
        font-size:16px;
    }

    .discord-link{
        font-size:16px;
    }

}
</style>
</head>
<body>

<div class="container">

    <img src="img/lsfd.png" alt="LSFD Logo" class="logo">

    <h1>UNDER MAINTENANCE</h1>

    <p class="description">
        The Los Santos Fire Department website is currently undergoing scheduled maintenance.
        Please check back later.
    </p>

    <a href="https://discord.gg/vtEF8GShhn"
       target="_blank"
       class="discord-link">
       CHECK THE LSFD DISCORD FOR THE LATEST UPDATES
    </a>

</div>

</body>
</html>
